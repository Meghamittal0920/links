<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --text: #eef0f3;
    --muted: #8b93a1;
    --accent: #4f8cff;
    --danger: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.15rem;
    font-weight: 600;
    margin: 0 0 6px;
  }
  p.sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 22px;
  }
  .ad-slot {
    background: #20242e;
    border: 1px dashed #3a3f4c;
    border-radius: 10px;
    min-height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 22px;
    padding: 10px;
    overflow: hidden;
  }
  .video-slot {
    margin-bottom: 22px;
  }
  .video-slot iframe {
    width: 100%;
    max-width: 300px;
    height: 250px;
    border: 0;
    border-radius: 10px;
  }
  .timer-ring {
    width: 64px;
    height: 64px;
    margin: 0 auto 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.2rem;
    background: conic-gradient(var(--accent) calc(var(--pct, 0) * 1%), #2a2f3a 0);
    transition: background 0.3s linear;
  }
  .timer-ring span {
    background: var(--card);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn {
    display: inline-block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    border: none;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .btn.active {
    opacity: 1;
    pointer-events: auto;
  }
  .btn:active { transform: scale(0.98); }
  .error {
    color: var(--danger);
    font-size: 0.9rem;
    margin-top: 10px;
  }
  .project-list {
    list-style: none;
    padding: 0;
    margin: 18px 0 0;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .project-list a {
    display: block;
    padding: 12px 14px;
    background: #20242e;
    border-radius: 10px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.95rem;
    border: 1px solid #2a2f3a;
    transition: background 0.15s;
  }
  .project-list a:hover {
    background: #262b36;
  }
</style>

<!-- Google IMA SDK: reads the HillTop VAST tag and actually plays the ad -->
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
<script>
  (function () {
    var HILLTOP_VAST_TAG = "https://tiny-ambition.com/dBmGFzz.dRGbNwvhZgGXUD/ke_mw9/uFZ/UIl/k/PnTzcoydNLD/AO3JO/DOUgt/NUzWIk0dMTDOcJ4/OfQQ";

    var videoContent = document.getElementById('adVideoContentEl');
    var adContainer = document.getElementById('adContainerDiv');
    var adsLoader, adsManager, adDisplayContainer;

    function initHilltopVideoAd() {
      if (typeof google === 'undefined' || !google.ima) return; // IMA SDK failed to load (e.g. adblock)

      adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, videoContent);
      adsLoader = new google.ima.AdsLoader(adDisplayContainer);

      adsLoader.addEventListener(
        google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
        onAdsManagerLoaded,
        false
      );
      adsLoader.addEventListener(
        google.ima.AdErrorEvent.Type.AD_ERROR,
        onAdError,
        false
      );

      var adsRequest = new google.ima.AdsRequest();
      adsRequest.adTagUrl = HILLTOP_VAST_TAG;
      adsRequest.linearAdSlotWidth = 300;
      adsRequest.linearAdSlotHeight = 250;
      adsRequest.nonLinearAdSlotWidth = 300;
      adsRequest.nonLinearAdSlotHeight = 150;

      adDisplayContainer.initialize();
      adsLoader.requestAds(adsRequest);
    }

    function onAdsManagerLoaded(adsManagerLoadedEvent) {
      adsManager = adsManagerLoadedEvent.getAdsManager(videoContent);
      adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
      try {
        adsManager.init(300, 250, google.ima.ViewMode.NORMAL);
        adsManager.start();
      } catch (e) {
        onAdError(e);
      }
    }

    function onAdError() {
      // No ad filled, or blocked — just hide the empty video box so it
      // doesn't leave a black rectangle on the page.
      var el = document.getElementById('adVideoContainer');
      if (el) el.style.display = 'none';
      if (adsManager) adsManager.destroy();
    }

    // Autoplay policies generally require the video to be muted (already
    // set above) to play without a click. Kick it off once the page loads.
    window.addEventListener('load', initHilltopVideoAd);
  })();
</script>

<script>
  // ---------------------------------------------------------------
  // PROJECT LOOKUP TABLE
  // Add one line per project: "id-you-choose": "https://real-link.com"
  // The "id" is what goes in the URL, e.g. ?id=project1
  // ---------------------------------------------------------------
  const PROJECTS = {
    "naruto":       "https://github.com/meghamittal0920/Naruto-SageMode",
    "zoro":         "https://github.com/meghamittal0920/Zoro-King-of-hell",
    "demonslayer":  "https://github.com/meghamittal0920/Demon-Slayer-Yorichi-Kokoshibo-",
    "jjk-sakuna":   "https://github.com/meghamittal0920/JJK-Sakuna",
    "impact":       "https://github.com/meghamittal0920/Imapact",
    "onepiece":     "https://github.com/meghamittal0920/One-Piece-3D-Website",
    "gojo":         "https://github.com/Meghamittal0920/Gojo",
    "luffy":        "https://github.com/SinghalAyushh/One-Piece",
    "goku":         "https://github.com/Meghamittal0920/goku",
    "portfolio":    "https://github.com/Meghamittal0920/Meghamittal0920/blob/main/animated-github-profile-guide.pdf"
  };

  const COUNTDOWN_SECONDS = 8;
  // ---------------------------------------------------------------

  const params = new URLSearchParams(window.location.search);

  function normalize(str) {
    return str.toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function prettyName(key) {
    return key
      .replace(/-/g, ' ')
      .replace(/\b\w/g, (c) => c.toUpperCase());
  }

  // 1) Try the clean ?id=project1 style first
  let projectId = params.get('id');
  let destination = projectId ? PROJECTS[projectId] : null;

  // 2) Fall back to matching Instagram's auto "source" param,
  //    e.g. ?source=Gojo-Repo-Here-🌀:6a5dae0251800bbc2e606996
  //    We take the text before the colon, strip "-Repo-Here" and symbols,
  //    then check if it matches (or contains) any PROJECTS key.
  if (!destination && params.get('source')) {
    const rawSource = decodeURIComponent(params.get('source'));
    const namePart = rawSource.split(':')[0];
    const normalizedSource = normalize(namePart);

    const matchKey = Object.keys(PROJECTS).find((key) => {
      const normalizedKey = normalize(key);
      return normalizedSource.includes(normalizedKey) || normalizedKey.includes(normalizedSource);
    });

    if (matchKey) {
      projectId = matchKey;
      destination = PROJECTS[matchKey];
    }
  }

  const ring = document.getElementById('timerRing');
  const num = document.getElementById('timerNum');
  const btn = document.getElementById('continueBtn');
  const statusText = document.getElementById('statusText');
  const titleText = document.getElementById('titleText');
  const projectList = document.getElementById('projectList');

  if (!destination) {
    // No project matched (bad/missing id, or user landed on the bare page).
    // Instead of a dead-end error, show every project as its own ad-page link,
    // so the visitor still watches an ad before reaching a project.
    titleText.textContent = "Browse projects";
    statusText.textContent = "Pick a project below to continue:";
    ring.style.display = 'none';
    btn.style.display = 'none';

    Object.keys(PROJECTS).forEach((key) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = `?id=${encodeURIComponent(key)}`;
      a.textContent = prettyName(key);
      li.appendChild(a);
      projectList.appendChild(li);
    });
    projectList.style.display = 'flex';
  } else {
    btn.href = destination;
    let secondsLeft = COUNTDOWN_SECONDS;

    const interval = setInterval(() => {
      secondsLeft--;
      const pct = Math.round(((COUNTDOWN_SECONDS - secondsLeft) / COUNTDOWN_SECONDS) * 100);
      ring.style.setProperty('--pct', pct);
      num.textContent = secondsLeft > 0 ? secondsLeft : '✓';

      if (secondsLeft <= 0) {
        clearInterval(interval);
        btn.classList.add('active');
        statusText.textContent = 'Your link is ready.';
      }
    }, 1000);

    // Mitigation: Social Bar (added below) sometimes hijacks the first click
    // anywhere on the page. Capturing the click on our own button first and
    // stopping it from bubbling further reduces (does not 100% guarantee
    // eliminate) that conflict. Test this after adding Social Bar.
    btn.addEventListener('click', function (e) {
      e.stopImmediatePropagation();
    }, true);
  }
</script>
